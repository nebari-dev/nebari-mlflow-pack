{{- if .Values.nebariapp.enabled }}
apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
  name: {{ include "nebari-mlflow-pack.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebari-mlflow-pack.labels" . | nindent 4 }}
spec:
  hostname: {{ required "nebariapp.hostname is required when nebariapp.enabled is true" .Values.nebariapp.hostname }}
  service:
    name: {{ .Values.nebariapp.service.name | default (include "nebari-mlflow-pack.mlflow-service-name" .) }}
    port: {{ .Values.nebariapp.service.port | default 80 }}
  {{- with .Values.nebariapp.routing }}
  routing:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.nebariapp.auth }}
  auth:
    enabled: {{ .enabled | default true }}
    provider: {{ .provider | default "keycloak" }}
    provisionClient: {{ .provisionClient | default true }}
    enforceAtGateway: {{ .enforceAtGateway | default true }}
    redirectURI: {{ .redirectURI | default "/oauth2/callback" }}
    {{- with .clientSecretRef }}
    clientSecretRef: {{ . }}
    {{- end }}
    {{- with .scopes }}
    scopes:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .groups }}
    groups:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .keycloakConfig }}
    keycloakConfig:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .denyRedirect }}
    denyRedirect:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  {{- with .Values.nebariapp.landingPage }}
  landingPage:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
