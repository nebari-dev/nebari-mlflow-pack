# Default values for nebari-mlflow-pack
# This is a YAML-formatted file.

# =============================================================================
# Nebari Integration
# =============================================================================
# Creates a NebariApp CRD that configures routing and auth via nebari-operator.
# Set to false when deploying outside of Nebari.
nebariapp:
  enabled: true
  # hostname: mlflow.nebari.example.com  # Required when enabled
  # keycloakHostname: ""                 # Required when auth.enabled (e.g., keycloak.example.com)
  keycloakRealm: nebari                  # Keycloak realm name
  service:
    # MLflow service (created by mlflow subchart)
    name: ""  # Defaults to <release>-mlflow
    port: 80
  routing:
    routes:
      - pathPrefix: /
  auth:
    enabled: true
    provider: keycloak
    provisionClient: true
    enforceAtGateway: true
    redirectURI: /oauth2/callback
    scopes:
      - openid
      - profile
      - email
      - groups
    # groups: []           # Groups to create in Keycloak (e.g., [admin, data-science-team])
    # keycloakConfig:      # Advanced Keycloak client configuration
    #   groups:            # Groups with optional member assignments
    #     - name: admin
    #       members: [nebari-admin]
    #     - name: data-science-team
    #   protocolMappers:   # Client-level protocol mappers
    #     - name: group-membership
    #       protocolMapper: oidc-group-membership-mapper
    #       config:
    #         claim.name: groups
    #         full.path: "false"
    #         id.token.claim: "true"
    #         access.token.claim: "true"
    #         userinfo.token.claim: "true"

# =============================================================================
# MLflow
# =============================================================================
# All values under this key are passed to the mlflow subchart.
# Ref: https://github.com/community-charts/helm-charts/tree/main/charts/mlflow
mlflow:
  service:
    type: ClusterIP

  # -- Backend store: bundled PostgreSQL (recommended for production).
  # When postgresql.enabled=true, the mlflow subchart automatically wires
  # PGHOST, PGPORT, PGDATABASE, PGUSER, and PGPASSWORD environment variables
  # and sets --backend-store-uri=postgresql:// on the server.
  # The default (postgresql.enabled=false) uses in-memory SQLite, which loses
  # data on every pod restart.
  backendStore:
    databaseMigration: true
    databaseConnectionCheck: true

  postgresql:
    enabled: true
    auth:
      username: mlflow
      database: mlflow
      # Option 1 (recommended): Reference a pre-created Kubernetes Secret.
      # The secret name MUST be "<release-name>-postgresql" (e.g.
      # "mlflow-pack-postgresql" if releaseName is "mlflow-pack").
      # The secret must contain keys: "password" and "postgres-password".
      # See README for creation instructions.
      existingSecret: ""
      # Option 2 (dev/testing only): Set the password inline.
      # password: ""
    primary:
      persistence:
        enabled: true
        size: 8Gi

# =============================================================================
# Overrides
# =============================================================================
nameOverride: ""
fullnameOverride: ""
