name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: mlflow-test

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update dependencies
        run: helm dependency update .

      - name: Install chart
        run: |
          kubectl create namespace mlflow
          helm template mlflow-pack . \
            --namespace mlflow \
            --set nebariapp.enabled=false \
            --set mlflow.postgresql.enabled=false \
            | kubectl apply -n mlflow -f -
          kubectl rollout status deployment/mlflow-pack -n mlflow --timeout=300s

      - name: Health check
        run: |
          kubectl port-forward -n mlflow svc/mlflow-pack 5080:80 &
          sleep 5
          curl -sf http://localhost:5080/health
          kill %1

      - name: Upgrade chart
        run: |
          helm template mlflow-pack . \
            --namespace mlflow \
            --set nebariapp.enabled=false \
            --set mlflow.postgresql.enabled=false \
            | kubectl apply -n mlflow -f -
          kubectl rollout status deployment/mlflow-pack -n mlflow --timeout=300s

      - name: Health check after upgrade
        run: |
          kubectl port-forward -n mlflow svc/mlflow-pack 5080:80 &
          sleep 5
          curl -sf http://localhost:5080/health
          kill %1
