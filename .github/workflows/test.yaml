name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: mlflow-test

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update dependencies
        run: helm dependency update .

      - name: Install chart
        run: |
          helm install mlflow-pack . \
            --create-namespace --namespace mlflow \
            --set nebariapp.enabled=false \
            --set mlflow.postgresql.auth.password=testpassword \
            --wait --timeout 5m

      - name: Wait for MLflow pod
        run: kubectl wait -n mlflow --for=condition=ready pod -l app=mlflow --timeout=180s

      - name: Health check
        run: |
          kubectl port-forward -n mlflow svc/mlflow-pack 5080:80 &
          sleep 5
          curl -sf http://localhost:5080/health
          kill %1

      - name: Uninstall
        run: helm uninstall mlflow-pack -n mlflow --wait
