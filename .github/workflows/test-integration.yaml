name: Integration Test (NebariApp)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "templates/**"
      - "values.yaml"
      - "Chart.yaml"
      - ".github/workflows/test-integration.yaml"

jobs:
  nebariapp-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLUSTER_NAME: mlflow-integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout nebari-operator (for dev/scripts)
        uses: actions/checkout@v4
        with:
          repository: nebari-dev/nebari-operator
          path: nebari-operator

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: mlflow-integration

      - name: Set up Helm
        uses: azure/setup-helm@v4

      # ============================================================
      # Infrastructure: MetalLB
      # ============================================================
      - name: Install MetalLB
        run: |
          kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.8/config/manifests/metallb-native.yaml
          kubectl wait --namespace metallb-system \
            --for=condition=available deployment/controller \
            --timeout=90s
          kubectl wait --namespace metallb-system \
            --for=jsonpath='{.status.numberReady}'=1 \
            daemonset/speaker \
            --timeout=90s

      - name: Configure MetalLB IP pool
        run: |
          KIND_NET_CIDR=$(docker network inspect kind -f '{{range .IPAM.Config}}{{.Subnet}}{{"\n"}}{{end}}' | grep '\.' | head -n1)
          BASE_IP=$(echo "${KIND_NET_CIDR}" | awk -F. '{print $1"."$2}')
          kubectl apply -f - <<EOF
          apiVersion: metallb.io/v1beta1
          kind: IPAddressPool
          metadata:
            name: kind-pool
            namespace: metallb-system
          spec:
            addresses:
              - ${BASE_IP}.255.200-${BASE_IP}.255.250
          ---
          apiVersion: metallb.io/v1beta1
          kind: L2Advertisement
          metadata:
            name: kind-l2
            namespace: metallb-system
          spec:
            ipAddressPools:
              - kind-pool
          EOF

      # ============================================================
      # Infrastructure: Envoy Gateway, cert-manager, Keycloak
      # ============================================================
      - name: Install foundational services
        run: nebari-operator/dev/scripts/services/install.sh

      - name: Setup Keycloak realm
        run: nebari-operator/dev/scripts/services/keycloak/setup.sh

      # ============================================================
      # Install nebari-operator
      # ============================================================
      - name: Install nebari-operator
        run: |
          # Install the CRDs and manifests from the release, then patch the image
          # tag to match quay.io (tags without the 'v' prefix).
          curl -sL https://github.com/nebari-dev/nebari-operator/releases/download/v0.1.0-alpha.13/install.yaml \
            | sed 's|quay.io/nebari/nebari-operator:v0.1.0-alpha.13|quay.io/nebari/nebari-operator:0.1.0-alpha.13|' \
            | kubectl apply -f -

      - name: Wait for nebari-operator
        run: |
          kubectl wait --for=condition=available deployment/nebari-operator-controller-manager \
            -n nebari-operator-system --timeout=120s

      # ============================================================
      # Test: mlflow-pack with NebariApp
      # ============================================================
      - name: Label namespace
        run: |
          kubectl create namespace mlflow
          kubectl label namespace mlflow nebari.dev/managed=true

      - name: Update dependencies
        run: helm dependency update .

      - name: Deploy mlflow-pack
        run: |
          helm install mlflow-pack . \
            --namespace mlflow \
            --set nebariapp.hostname=mlflow.nebari.local \
            --set nebariapp.auth.enabled=false \
            --set mlflow.postgresql.enabled=false \
            --wait --timeout 5m

      - name: Verify NebariApp
        run: |
          kubectl wait --for=condition=Ready nebariapp -n mlflow -l app.kubernetes.io/instance=mlflow-pack --timeout=120s
          kubectl get httproute -n mlflow
          echo "mlflow-pack: NebariApp Ready"

      - name: Health check
        run: |
          kubectl port-forward -n mlflow svc/mlflow-pack 5080:80 &
          sleep 5
          curl -sf http://localhost:5080/health
          kill %1

      - name: Cleanup
        if: always()
        run: helm uninstall mlflow-pack -n mlflow --wait || true

      # ============================================================
      # Debug on failure
      # ============================================================
      - name: Debug info on failure
        if: failure()
        run: |
          echo "=== NebariApps ==="
          kubectl get nebariapp -A -o wide || true
          echo ""
          echo "=== NebariApp details ==="
          kubectl describe nebariapp -n mlflow || true
          echo ""
          echo "=== HTTPRoutes ==="
          kubectl get httproute -A || true
          echo ""
          echo "=== Pods ==="
          kubectl get pods -n mlflow || true
          echo ""
          echo "=== MLflow logs ==="
          kubectl logs -n mlflow -l app=mlflow --tail=50 || true
          echo ""
          echo "=== Operator logs ==="
          kubectl logs -n nebari-operator-system deployment/nebari-operator-controller-manager \
            --tail=50 || true
          echo ""
          echo "=== Events ==="
          kubectl get events -n mlflow --sort-by=.lastTimestamp | tail -30 || true
