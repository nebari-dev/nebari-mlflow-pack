name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update dependencies
        run: helm dependency update .

      - name: Lint chart
        run: helm lint .

      - name: Template (NebariApp disabled)
        run: helm template test . --set nebariapp.enabled=false --set mlflow.postgresql.auth.password=test

      - name: Template (NebariApp enabled)
        run: helm template test . --set nebariapp.hostname=test.example.com --set mlflow.postgresql.auth.password=test

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Validate schemas (NebariApp disabled)
        run: |
          helm template test . \
            --set nebariapp.enabled=false \
            --set mlflow.postgresql.auth.password=test \
            | kubeconform -strict -ignore-missing-schemas -summary

      - name: Validate schemas (NebariApp enabled)
        run: |
          helm template test . \
            --set nebariapp.hostname=test.example.com \
            --set mlflow.postgresql.auth.password=test \
            | kubeconform -strict -ignore-missing-schemas -summary
